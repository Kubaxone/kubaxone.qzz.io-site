<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kubaxone (He/Him)</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.03);
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #4aa3ff;
      cursor: pointer;
    }

    h1 {
      margin: 15px 0 5px;
    }

    p {
      margin: 5px 0;
      opacity: 0.8;
    }

    .hidden {
      display: none;
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }

    input {
      margin-top: 10px;
      padding: 8px;
      width: 90%;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #4aa3ff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2f8de0;
    }
  </style>
</head>

<body>

  <div class="card">
    <!-- PROFILE IMAGE FROM STATIC -->
    <img src="/static/profile.png" id="profilePic" />

    <h1>Kubaxone</h1>
    <p>He/Him • Programmer</p>

    <input id="statusInput" placeholder="Set your status..." />
    <button onclick="updateStatus()">Update Status</button>

    <p id="statusText" class="hidden"></p>

    <button onclick="toggleInfo()">Toggle Info</button>

    <div id="info" class="hidden">
      <p>Python • HTML • CSS • JS</p>
      <p>I build games, bots & websites</p>
    </div>
  </div>

  <script>
    const profilePic = document.getElementById("profilePic");
    const info = document.getElementById("info");
    const statusText = document.getElementById("statusText");

    function toggleInfo() {
      info.style.display = info.style.display === "block" ? "none" : "block";
    }

    function updateStatus() {
      const val = document.getElementById("statusInput").value;
      if (!val) return;

      statusText.textContent = "Status: " + val;
      statusText.style.display = "block";
    }

    // click image to "pulse"
    profilePic.onclick = () => {
      profilePic.style.transform = "scale(1.1)";
      setTimeout(() => profilePic.style.transform = "scale(1)", 150);
    };
  </script>

</body>
</html>
