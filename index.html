<!DOCTYPE html>
<html dir="ltr" lang="en" class="theme light classic">
<head>
  <meta charset="utf-8">
  <title>Kubaxone (He/Him)</title>
</head>

<body>

<div id="root"></div>

<!-- YOUR CONTENT AREA (minimal touch version) -->
<div style="padding:20px; font-family:Arial;">

  <!-- PROFILE IMAGE (FIXED) -->
  <img src="/static/profile.png"
       style="width:120px;height:120px;border-radius:50%;display:block;margin-bottom:10px;"
       id="pfp">

  <h1>Kubaxone (He/Him)</h1>

  <button id="resumeBtn">Resume</button>
  <button id="emailBtn">Email me</button>
  <button id="portfolioBtn">Portfolio</button>

  <div id="resume" style="display:none;margin-top:10px;">
    <p>Resume section content here</p>
  </div>

  <div id="email" style="display:none;margin-top:10px;">
    <p>your@email.com</p>
  </div>

  <div id="portfolio" style="display:none;margin-top:10px;">
    <p>Portfolio content here</p>
  </div>

</div>

<script>
  const resume = document.getElementById("resume");
  const email = document.getElementById("email");
  const portfolio = document.getElementById("portfolio");

  document.getElementById("resumeBtn").onclick = () => {
    resume.style.display = resume.style.display === "block" ? "none" : "block";
  };

  document.getElementById("emailBtn").onclick = () => {
    email.style.display = email.style.display === "block" ? "none" : "block";
  };

  document.getElementById("portfolioBtn").onclick = () => {
    portfolio.style.display = portfolio.style.display === "block" ? "none" : "block";
  };

  // small extra interactivity (optional but harmless)
  document.getElementById("pfp").onclick = () => {
    alert("Kubaxone profile clicked!");
  };
</script>

</body>
</html>
