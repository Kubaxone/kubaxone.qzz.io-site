<!-- minimal interaction layer (does NOT replace Canva layout) -->
<script>
  function toggle(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.display = el.style.display === "block" ? "none" : "block";
  }
</script>

<!-- we only "attach behavior" to existing Canva buttons if they exist -->
<script>
window.addEventListener("load", () => {

  // FIX PROFILE IMAGE IF YOU ADD IT IN CANVA OR ROOT
  const trySetImage = () => {
    const imgs = document.querySelectorAll("img");
    imgs.forEach(img => {
      if (img.src.includes("MAHKOScPFLI") || img.alt === "profile") {
        img.src = "/static/profile.png";
      }
    });
  };

  trySetImage();

  // Example: hook Canva buttons by text (safe fallback)
  document.body.addEventListener("click", (e) => {
    const t = e.target;

    if (!t || !t.innerText) return;

    if (t.innerText.includes("Resume")) {
      console.log("Resume clicked");
    }

    if (t.innerText.includes("Email")) {
      console.log("Email clicked");
    }

    if (t.innerText.includes("Portfolio")) {
      console.log("Portfolio clicked");
    }
  });

});
</script>
